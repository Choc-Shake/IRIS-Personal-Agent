services:
  iris:
    build: .
    container_name: iris-agent
    restart: unless-stopped
    ports:
      - "3010:3000"
    volumes:
      - ./data:/app/data              # Persist SQLite database
      - ./.agent:/app/.agent           # Persist persona & skills
      - ./.env:/app/.env               # Environment config (API keys)
      - ./mcp_config.docker.json:/app/mcp_config.json  # MCP config (Docker paths)
    environment:
      - NODE_ENV=production
